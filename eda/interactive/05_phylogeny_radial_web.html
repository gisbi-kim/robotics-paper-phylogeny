<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robotics Phylogeny — Interactive Radial Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&family=Roboto+Mono&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-subtle: #f8f9fa;
    --bg-elevated: #ffffff;
    --text: #202124;
    --text-secondary: #5f6368;
    --text-muted: #80868b;
    --border: #e8eaed;
    --border-strong: #dadce0;
    --primary: #1a73e8;
    --primary-bg: #e8f0fe;
    --warning: #b06000;
    --warning-bg: #fef7e0;
    --focus: #fbbc04;
    --elev-1: 0 1px 2px 0 rgba(60,64,67,0.30), 0 1px 3px 1px rgba(60,64,67,0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Google Sans', 'Roboto', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
  }
  a { color: var(--primary); text-decoration: none; }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
  }

  /* ============== Left Sidebar (info panel) ============== */
  .sidebar {
    background: var(--bg-subtle);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
    font-size: 13px;
  }
  .sidebar h1 {
    font-family: 'Google Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar .subtitle {
    color: var(--text-secondary);
    font-size: 12px;
    margin-bottom: 16px;
  }
  .help-card {
    background: white;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: var(--elev-1);
    font-size: 12px;
    color: var(--text-secondary);
  }
  .help-card .row {
    display: flex; align-items: center; justify-content: space-between;
    margin: 4px 0;
  }
  .help-card kbd {
    background: var(--bg-subtle);
    border: 1px solid var(--border-strong);
    border-bottom-width: 2px;
    border-radius: 3px;
    padding: 1px 6px;
    font-family: 'Roboto Mono', monospace;
    font-size: 10px;
    color: var(--text);
  }
  .reset-btn {
    width: 100%;
    background: white;
    color: var(--primary);
    border: 1px solid var(--border-strong);
    padding: 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Google Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    margin-top: 10px;
    transition: background 0.15s;
  }
  .reset-btn:hover { background: var(--bg-subtle); }

  /* Info card (current focus/hover) */
  .info-card {
    background: white;
    border-radius: 8px;
    padding: 16px;
    box-shadow: var(--elev-1);
    margin-bottom: 12px;
  }
  .info-empty {
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
    padding: 24px 12px;
    font-style: italic;
  }
  .info-source {
    display: inline-block;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--bg-subtle);
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .info-source.focus { background: var(--warning-bg); color: var(--warning); }
  .info-source.hover { background: var(--primary-bg); color: var(--primary); }
  .info-breadcrumb {
    color: var(--text-secondary);
    font-size: 11px;
    line-height: 1.5;
    margin-bottom: 8px;
    word-break: break-word;
  }
  .info-breadcrumb .crumb {
    color: var(--text-secondary);
  }
  .info-breadcrumb .sep {
    color: var(--text-muted);
    margin: 0 4px;
  }
  .info-name {
    font-family: 'Google Sans', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
    word-break: break-word;
  }
  .info-stats {
    display: flex; gap: 12px;
    margin-bottom: 12px;
  }
  .info-stat {
    flex: 1;
    background: var(--bg-subtle);
    border-radius: 4px;
    padding: 8px 10px;
  }
  .info-stat .v {
    font-family: 'Google Sans', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
  }
  .info-stat .l {
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .info-meta {
    display: grid;
    grid-template-columns: 50px 1fr;
    gap: 4px 8px;
    font-size: 11px;
  }
  .info-meta .k {
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
    font-size: 10px;
  }
  .info-meta .v {
    color: var(--text);
  }

  .children-list {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .children-list .title {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .children-row {
    display: grid;
    grid-template-columns: 1fr 50px;
    gap: 8px;
    align-items: center;
    padding: 4px 0;
    font-size: 12px;
    cursor: pointer;
    border-radius: 3px;
    padding: 4px 6px;
    margin: 0 -6px;
  }
  .children-row:hover { background: var(--bg-subtle); }
  .children-row .name {
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .children-row .count {
    text-align: right;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    font-size: 11px;
  }
  .children-row .bar {
    grid-column: 1 / -1;
    height: 3px;
    background: var(--bg-subtle);
    border-radius: 2px;
    margin-top: 2px;
    overflow: hidden;
  }
  .children-row .bar .fill {
    height: 100%;
    background: var(--primary);
    opacity: 0.5;
  }
  .children-row:hover .bar .fill {
    background: var(--primary);
    opacity: 0.8;
  }

  /* ============== Main (SVG) ============== */
  .main {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    overflow: hidden;
  }
  svg {
    max-width: 100%; max-height: 100%;
  }
  .arc {
    transition: opacity 0.2s ease;
    cursor: pointer;
  }
  .arc:hover { stroke: white; stroke-width: 1.5px; }
  .dimmed { opacity: 0.12; }
  .highlighted { opacity: 1; }
  .focused {
    stroke: var(--focus) !important;
    stroke-width: 3px !important;
  }
  .label-inline {
    pointer-events: none;
    font-family: 'Google Sans', sans-serif;
  }
  .label-inline.depth-1 {
    font-size: 11px;
    font-weight: 700;
    fill: #fff;
    text-shadow: 0 0 3px rgba(0,0,0,0.7);
  }
  .label-inline.depth-2 {
    font-size: 8.5px;
    font-weight: 500;
    fill: #1a1a1a;
  }
  .label-inline.depth-3 {
    font-size: 7px;
    font-weight: 400;
    fill: #333;
  }
  .leader-line {
    fill: none;
    stroke: #999;
    stroke-width: 0.7;
    pointer-events: none;
  }
  .label-leader {
    pointer-events: none;
    font-family: 'Google Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    fill: #1a1a1a;
  }
  .label-leader.depth-1 { font-size: 10px; font-weight: 700; }

  .center-label {
    text-anchor: middle;
    font-weight: 500;
    font-size: 14px;
    fill: var(--text);
    font-family: 'Google Sans', sans-serif;
  }
  .center-sub {
    text-anchor: middle;
    font-size: 11px;
    fill: var(--text-secondary);
  }

  @media (max-width: 720px) {
    .layout { grid-template-columns: 100%; grid-template-rows: 280px 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- ============ LEFT SIDEBAR ============ -->
  <aside class="sidebar">
    <h1>🌳 Phylogeny Tree</h1>
    <div class="subtitle">7,477 robotics papers · 13 Phylum × 100 Class</div>

    <div class="help-card">
      <div class="row"><span>호버 (강조)</span><kbd>mouse</kbd></div>
      <div class="row"><span>계열 선택</span><kbd>click</kbd></div>
      <div class="row"><span>형제 이동</span><kbd>← →</kbd></div>
      <div class="row"><span>부모</span><kbd>↑</kbd></div>
      <div class="row"><span>첫 자식</span><kbd>↓</kbd></div>
      <div class="row"><span>해제</span><kbd>Esc</kbd></div>
      <button class="reset-btn" id="reset">선택 해제</button>
    </div>

    <!-- Focused (sticky) info -->
    <div id="focused-card"></div>
    <!-- Hovered (transient) info -->
    <div id="hovered-card"></div>
  </aside>

  <!-- ============ MAIN (SVG) ============ -->
  <main class="main">
    <svg id="tree" viewBox="-460 -460 920 920"></svg>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
const RADIUS = 420;       // outer radius of the tree itself
const ROOT_R0 = 0;
const ROOT_R1 = 60;
const LEADER_INNER = RADIUS + 12;   // where leaders start (just past tree)
const LEADER_OUTER = RADIUS + 38;   // where leaders bend / labels begin
const LABEL_PAD    = 4;             // gap between line and text

const svg = d3.select('#tree');
const focusedCard = d3.select('#focused-card');
const hoveredCard = d3.select('#hovered-card');

function lighten(hex, amt) {
  return d3.interpolateRgb(hex, '#ffffff')(amt);
}

let root, arcs, arc;
let focusedNode = null;

d3.json('tree_data.json').then(data => {
  root = d3.hierarchy(data)
    .sum(d => d.value || 0)
    .sort((a, b) => b.value - a.value);

  const partition = d3.partition()
    .size([2 * Math.PI, RADIUS - ROOT_R1]);
  partition(root);

  // Adjust ring radii by depth
  const ringWidth = (RADIUS - ROOT_R1) / 4;
  root.each(d => {
    if (d.depth === 0) {
      d.y0 = 0; d.y1 = ROOT_R1;
    } else {
      d.y0 = ROOT_R1 + (d.depth - 1) * ringWidth;
      d.y1 = ROOT_R1 + d.depth * ringWidth;
    }
  });

  arc = d3.arc()
    .startAngle(d => d.x0)
    .endAngle(d => d.x1)
    .innerRadius(d => d.y0)
    .outerRadius(d => d.y1)
    .padAngle(0.001)
    .padRadius(RADIUS / 4);

  function nodeColor(d) {
    if (d.depth === 0) return '#222';
    let phyAncestor = d;
    while (phyAncestor.depth > 1) phyAncestor = phyAncestor.parent;
    const baseColor = phyAncestor.data.color || '#888';
    if (d.depth === 1) return baseColor;
    if (d.depth === 2) return lighten(baseColor, 0.35);
    if (d.depth === 3) return lighten(baseColor, 0.55);
    return lighten(baseColor, 0.72);
  }

  const allNodes = root.descendants().filter(d => d.depth > 0);
  arcs = svg.selectAll('path.arc')
    .data(allNodes)
    .join('path')
    .attr('class', 'arc')
    .attr('d', arc)
    .attr('fill', d => nodeColor(d))
    .attr('stroke', 'white')
    .attr('stroke-width', 0.5)
    .on('mouseover', function(event, d) {
      d3.select(this).attr('stroke-width', 2);
      renderHoverPanel(d);
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke-width', 0.5);
      renderHoverPanel(null);
    })
    .on('click', function(event, d) {
      event.stopPropagation();
      selectNode(d);
    });

  // Center text
  svg.append('text')
    .attr('class', 'center-label')
    .attr('y', -4)
    .text('Robotics');
  svg.append('text')
    .attr('class', 'center-sub')
    .attr('y', 14)
    .text(`${root.value.toLocaleString()} papers`);

  // ============== Label system ==============
  //
  //  All labels are oriented RADIALLY OUTWARD (along the line from
  //  the center to the wedge). For wedges where the text is too long
  //  to fit inside the band, we draw an L-shaped leader line that
  //  ends in the outer margin, with a horizontal label at the tip.
  //
  //   ─────────────────────────────────────────────────────────────
  //   Inline:   wedge ▒▒▒▒░░░░ ―→ "Manipulation"  (radial inside)
  //
  //   Leader:   wedge ▒  ╮
  //                       ╰─── "Robot Software & Architecture"
  //   ─────────────────────────────────────────────────────────────

  const FONT_PER_CHAR = 0.55;   // approx text-width / fontSize per char

  function midAngleOf(d) { return (d.x0 + d.x1) / 2; }
  function bandRadialWidth(d) { return d.y1 - d.y0; }
  function bandMidR(d) { return (d.y0 + d.y1) / 2; }

  function fontSizeFor(depth) {
    if (depth === 1) return 11;   // Phylum
    if (depth === 2) return 8.5;  // Class
    return 7;                     // Order/Genus
  }

  function approxTextWidth(name, fontSize) {
    return name.length * fontSize * FONT_PER_CHAR;
  }

  // Polar (D3 sunburst convention: 0 at top, CW) → cartesian (SVG y-down)
  function polarXY(angleRad, r) {
    return [Math.sin(angleRad) * r, -Math.cos(angleRad) * r];
  }

  // For a label centered at angle `mid`, returns text rotation (degrees)
  // so the text reads radially outward AND is upright when viewed normally.
  function radialUprightRotation(angleRad) {
    let deg = (angleRad * 180 / Math.PI) - 90;   // tangent angle (CCW from +x)
    // Rotate by `deg + 90` to align text along the radial direction
    let rot = deg + 90;
    // Normalize to (-180, 180]
    while (rot > 180) rot -= 360;
    while (rot <= -180) rot += 360;
    // Auto-flip so the text is never upside down
    if (rot > 90) rot -= 180;
    else if (rot < -90) rot += 180;
    return rot;
  }

  // Decide labeling for one node.
  // Strategy: ALL labels are inline radial outward, with text truncated
  // to fit within the band's radial width. No leader lines — keeps the
  // figure tidy. Density is limited per parent so we don't crowd narrow
  // sectors.
  // Returns { mode: 'inline'|'skip', label: string }
  function labelDecision(d) {
    // Show only depth 1-3: Phylum, Class, Order (소분류까지). Skip Genus.
    if (d.depth < 1 || d.depth > 3) return { mode: 'skip' };

    const span = d.x1 - d.x0;
    if (span < 0.004) return { mode: 'skip' };  // ~0.23° — too thin to label

    // Density caps so labels don't pile up
    if (d.depth === 2) {
      // Class: top 5 per Phylum, span ≥ 0.4°
      const sib = d.parent.children.slice().sort((a, b) => b.value - a.value);
      if (sib.indexOf(d) >= 5 || span < 0.007) return { mode: 'skip' };
    } else if (d.depth === 3) {
      // Order: top 2 per Class, span ≥ 1.0°
      const sib = d.parent.children.slice().sort((a, b) => b.value - a.value);
      if (sib.indexOf(d) >= 2 || span < 0.018) return { mode: 'skip' };
    }

    // Truncate text to fit the band's radial budget
    const fontSize = fontSizeFor(d.depth);
    const radialBudget = bandRadialWidth(d) * 0.92;
    const charBudget = Math.floor(radialBudget / (fontSize * FONT_PER_CHAR));
    if (charBudget < 2) return { mode: 'skip' };

    let name = d.data.name;
    if (name.length > charBudget) {
      name = (charBudget >= 2)
        ? name.slice(0, Math.max(1, charBudget - 1)) + '…'
        : name.slice(0, charBudget);
    }
    return { mode: 'inline', label: name };
  }

  const labelDecisions = allNodes.map(d => ({ d, ...labelDecision(d) }));
  const inlineLabels = labelDecisions.filter(x => x.mode === 'inline');
  const leaderLabels = [];   // unused — keeping for future flexibility

  // ----- Inline radial labels -----
  svg.selectAll('text.label-inline')
    .data(inlineLabels)
    .join('text')
    .attr('class', x => `label-inline depth-${x.d.depth}`)
    .attr('transform', x => {
      const mid = midAngleOf(x.d);
      const r = bandMidR(x.d);
      const [cx, cy] = polarXY(mid, r);
      const rot = radialUprightRotation(mid);
      return `translate(${cx},${cy}) rotate(${rot})`;
    })
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .text(x => x.label);

  // ----- Leader lines (L-shape) + labels at outer margin -----
  // Geometry per leader:
  //   p0 = (mid, R_band_outer)            — start at outer edge of wedge
  //   p1 = (mid, LEADER_INNER)            — first kink: short radial step out
  //   p2 = (mid, LEADER_OUTER)            — second kink: further out
  //   text at (mid, LEADER_OUTER + PAD), oriented radially upright
  //   (We stack across rings naturally — no overlap because each leader
  //    follows its own midangle.)
  const leaderG = svg.append('g').attr('class', 'leaders');

  leaderG.selectAll('polyline')
    .data(leaderLabels)
    .join('polyline')
    .attr('class', 'leader-line')
    .attr('points', x => {
      const mid = midAngleOf(x.d);
      const p0 = polarXY(mid, x.d.y1);
      const p1 = polarXY(mid, LEADER_INNER);
      const p2 = polarXY(mid, LEADER_OUTER);
      return `${p0[0]},${p0[1]} ${p1[0]},${p1[1]} ${p2[0]},${p2[1]}`;
    });

  leaderG.selectAll('text.label-leader')
    .data(leaderLabels)
    .join('text')
    .attr('class', x => `label-leader depth-${x.d.depth}`)
    .attr('transform', x => {
      const mid = midAngleOf(x.d);
      const r = LEADER_OUTER + LABEL_PAD;
      const [cx, cy] = polarXY(mid, r);
      const rot = radialUprightRotation(mid);
      return `translate(${cx},${cy}) rotate(${rot})`;
    })
    .attr('text-anchor', x => {
      // Text reads outward from center; auto-flip means letters' tops always
      // point "outward enough". For leader labels, anchor at start so the
      // text begins right after the leader line tip.
      const mid = midAngleOf(x.d);
      const deg = (mid * 180 / Math.PI) - 90;
      // After auto-flip, the radial-outward direction may have been reversed.
      // Determine if the text was flipped (lower half).
      let rot = deg + 90;
      while (rot > 180) rot -= 360;
      while (rot <= -180) rot += 360;
      const flipped = (rot > 90) || (rot < -90);
      return flipped ? 'end' : 'start';
    })
    .attr('dy', '0.35em')
    .text(x => x.label);

  // Initial empty info
  renderFocusedPanel(null);
  renderHoverPanel(null);

  // Background click resets
  svg.on('click', resetSelection);
  d3.select('#reset').on('click', resetSelection);

  // Keyboard nav
  d3.select(window).on('keydown', (event) => {
    if (!focusedNode) return;
    let handled = true;
    switch (event.key) {
      case 'ArrowLeft':  navigate('prev');   break;
      case 'ArrowRight': navigate('next');   break;
      case 'ArrowUp':    navigate('parent'); break;
      case 'ArrowDown':  navigate('child');  break;
      case 'Escape':     resetSelection();   break;
      default: handled = false;
    }
    if (handled) event.preventDefault();
  });

}).catch(err => {
  console.error('Failed to load tree_data.json', err);
});


// ===== Selection / focus management =====
function selectNode(d) {
  focusedNode = d;
  const ancestors = new Set(d.ancestors());
  const descendants = new Set(d.descendants());

  arcs.classed('dimmed', n => !ancestors.has(n) && !descendants.has(n))
      .classed('highlighted', n => ancestors.has(n) || descendants.has(n))
      .classed('focused', n => n === d);

  renderFocusedPanel(d);
}

function resetSelection() {
  focusedNode = null;
  arcs.classed('dimmed', false)
      .classed('highlighted', false)
      .classed('focused', false);
  renderFocusedPanel(null);
}

function navigate(direction) {
  if (!focusedNode) return;
  const d = focusedNode;
  let target = null;
  switch (direction) {
    case 'parent':
      if (d.parent && d.parent.depth >= 1) target = d.parent;
      break;
    case 'child':
      if (d.children && d.children.length > 0) target = d.children[0];
      break;
    case 'next':
    case 'prev': {
      if (!d.parent || !d.parent.children) break;
      const siblings = d.parent.children.slice().sort((a, b) => a.x0 - b.x0);
      const i = siblings.indexOf(d);
      if (i < 0) break;
      const n = siblings.length;
      const j = direction === 'next' ? (i + 1) % n : (i - 1 + n) % n;
      target = siblings[j];
      break;
    }
  }
  if (target) selectNode(target);
}


// ===== Sidebar render =====
const DEPTH_KIND = ['Robotics', 'Phylum', 'Class', 'Order', 'Genus'];

function buildBreadcrumbHTML(d) {
  return d.ancestors().reverse()
    .map((n, i, arr) => {
      const isLast = i === arr.length - 1;
      return `<span class="crumb"${isLast ? ' style="color:#202124;font-weight:500"' : ''}>${escapeHTML(n.data.name)}</span>`;
    })
    .join('<span class="sep">›</span>');
}

function buildInfoCardHTML(d, sourceLabel, sourceClass) {
  if (!d) {
    return `<div class="info-card"><div class="info-empty">${
      sourceLabel === 'FOCUSED'
        ? '아무 wedge나 클릭하면 여기에 정보가 표시됩니다.'
        : 'wedge에 마우스를 올려보세요.'
    }</div></div>`;
  }
  const total = root ? root.value : d.value;
  const pct = (d.value / total * 100).toFixed(2);
  const kind = DEPTH_KIND[d.depth] || `Depth ${d.depth}`;

  // Top children (if any)
  let childrenHTML = '';
  if (d.children && d.children.length > 0) {
    const sorted = d.children.slice().sort((a, b) => b.value - a.value).slice(0, 8);
    const maxVal = sorted[0].value;
    childrenHTML = `
      <div class="children-list">
        <div class="title">Top sub-categories (${d.children.length})</div>
        ${sorted.map(c => `
          <div class="children-row" data-name="${escapeAttr(c.data.name)}">
            <span class="name">${escapeHTML(c.data.name)}</span>
            <span class="count">${c.value.toLocaleString()}</span>
            <div class="bar"><div class="fill" style="width:${(c.value / maxVal * 100).toFixed(1)}%"></div></div>
          </div>`).join('')}
      </div>`;
  }

  return `
    <div class="info-card">
      <span class="info-source ${sourceClass}">${sourceLabel}</span>
      <div class="info-breadcrumb">${buildBreadcrumbHTML(d)}</div>
      <div class="info-name">${escapeHTML(d.data.name)}</div>
      <div class="info-stats">
        <div class="info-stat"><div class="v">${d.value.toLocaleString()}</div><div class="l">Papers</div></div>
        <div class="info-stat"><div class="v">${pct}%</div><div class="l">of total</div></div>
      </div>
      <div class="info-meta">
        <span class="k">Kind</span><span class="v">${kind}</span>
        <span class="k">Depth</span><span class="v">${d.depth} / 4</span>
        <span class="k">Children</span><span class="v">${d.children ? d.children.length : 0}</span>
      </div>
      ${childrenHTML}
    </div>`;
}

function renderFocusedPanel(d) {
  focusedCard.html(buildInfoCardHTML(d, 'FOCUSED', 'focus'));
  // Click on a sub-category row → navigate to that child
  if (d) {
    focusedCard.selectAll('.children-row').on('click', function() {
      const name = this.getAttribute('data-name');
      const child = (d.children || []).find(c => c.data.name === name);
      if (child) selectNode(child);
    });
  }
}

function renderHoverPanel(d) {
  hoveredCard.html(buildInfoCardHTML(d, 'HOVER', 'hover'));
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function escapeAttr(s) { return escapeHTML(s); }
</script>
</body>
</html>
